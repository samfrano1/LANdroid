<!DOCTYPE html>
<html>
<head>
<title>LANdroid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

h1{
color:#38bdf8;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
margin:20px;
}

button{
background:#38bdf8;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
}

</style>
</head>

<body>

<h1>LANdroid</h1>

<div class="box">
<h3>Servidor LAN</h3>
<p>Estado: Activo</p>
<p>IP: 192.168.1.xxx</p>
</div>

<div class="box">
<h3>Archivos compartidos</h3>
<button>Explorar archivos</button>
</div>

<div class="box">
<h3>Subir archivo</h3>
<input type="file">
</div>

</body>
</html>
