<!DOCTYPE html>
<html>

<head>

<title>LANdroid</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

.container{
padding:20px;
}

.card{
background:#334155;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

.button{
background:#1e293b;
padding:18px;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.button:hover{
background:#0f172a;
}

a{
color:#38bdf8;
text-decoration:none;
margin-left:10px;
}

.footer{
text-align:center;
padding:20px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
LANdroid 📡
</div>

<div class="container">

<div class="card">
<h3>📂 File Explorer</h3>
<p>Explore files shared on LANdroid</p>
</div>

<div class="card">

<h3>📤 Upload Files</h3>

<input type="file" id="fileInput">

<br><br>

<div class="button" onclick="shareFile()">
Send to LANdroid
</div>

</div>

<div class="card">

<h3>📥 Download Files</h3>

<div class="button" onclick="showDownloads()">
Show Shared Files
</div>

</div>

<div class="card">

<h3>📡 Devices on Network</h3>

<div class="button" onclick="scanNetwork()">
Scan Network
</div>
